<!DOCTYPE html>
<head>
    <!-- favicon warning fix -->
    <link rel="icon" href="/">
</head>

<body>
    <!-- scene containers -->
    <div id="exampleContainer"></div>
    <div id="otherContainer"></div>
</body>

<style>
    body {
        background-color: #111;
        display: flex;
    }
    #otherContainer {
        max-width: 20rem;
    }
</style>

<!-- connect whalelib scripts -->
<script src="../whalelib.js"></script>

<script>
    // apply regular style attributes to a <body> tag
    Tools.useCustomBody();

    // create scene instances
    const exampleContainer  = new SceneStorage(document.getElementById("exampleContainer"));
    const otherContainer    = new SceneStorage(document.getElementById("otherContainer"));

    // load scene content using this
    exampleContainer.loadScene("./scns/example_scene");
    otherContainer.loadScene("./scns/other_scene");

    // unload scene after a while
    setTimeout(() => { exampleContainer.unloadScene() }, 4000);
</script>
