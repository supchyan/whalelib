<!DOCTYPE html>
<head>
    <!-- favicon warning fix -->
    <link rel="icon" href="/">
</head>

<body class="centered">
    <!-- scene containers -->
    <div class="centered" id="content">
        <div id="updateScene"></div>
        <div id="animationScene"></div>
        <div id="graphicsScene"></div>
    </div>
    <div class="centered" id="bottomBar">
        <div class="centered" id="nextButton">next</div>
        <div class="centered" id="sceneInfo"></div>
    </div>
</body>

<style>
    .centered {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    body {
        background-color: #111;
        flex-direction: column;
    }
    #content {
        width: 100%;
        flex-grow: 1;
    }
    #bottomBar {
        width: 100%;
        height: 4rem;

        gap: 1rem;

        color: #ffff;
        font-family: "Arial";

        user-select: none;
    }
    #nextButton {
        width: 5rem;
        height: 2rem;
        background-color: #222222;

        border-radius: .2rem;
    }
</style>

<!-- connect whalelib scripts -->
<script src="./whalelib.js"></script>

<script>
    // apply regular style attributes to a <body> tag
    Tools.useCleanBody();

    // define scenes
    const scenes = [
        new Scene(document.getElementById("updateScene")).load("./scns/update_scene"),
        new Scene(document.getElementById("animationScene")).load("./scns/animation_scene"),
        new Scene(document.getElementById("graphicsScene")).load("./scns/graphics_scene"),
    ];
    
    var sceneIndex = 0;

    document.getElementById("nextButton").onclick = () => {
        sceneIndex = sceneIndex == scenes.length - 1 ? 0 : sceneIndex + 1;
        updateVisibility(sceneIndex);
    }

    function updateVisibility(n) {
        for (var i = 0; i < scenes.length; i++) {
            i == n ? scenes[i].show() : scenes[i].collapse()
        }

        // draw current scene id
        document.getElementById("sceneInfo").innerHTML = `current scene: ${scenes[n].getId()}`;
    }
    updateVisibility(sceneIndex);
</script>
