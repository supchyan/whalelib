<!DOCTYPE html>
<head>
    <!-- favicon warning fix -->
    <link rel="icon" href="/">
</head>

<body></body>

<!-- connect whalelib scripts -->
<script src="../whalelib.js"></script>

<script>
    // initialize default settings
    SceneSystem.init();
    // enable debug log for scene loader
    SceneLoader.debug();
    // load the `example_scene` (path to scene directory)
    SceneLoader.load("example_scene");

    // unload the scene after 4000 ticks
    setTimeout(() => { SceneLoader.unload(); }, 4000);
</script>
