<!DOCTYPE html>
<head>
    <!-- favicon warning fix -->
    <link rel="icon" href="/">
</head>

<body>
    <!-- scene containers -->
    <div id="exampleParent"></div>
    <div id="otherExampleParent"></div>
</body>

<style>
    body {
        background-color: #111;
        display: flex;
    }
    #otherRoot {
        max-width: 20rem;
    }
</style>

<!-- connect whalelib scripts -->
<script src="../whalelib.js"></script>

<script>
    // apply regular style attributes to a <body> tag
    Tools.useCustomBody();

    // create scene instances
    const exampleParent      = new Scene(document.getElementById("exampleParent"));
    const otherExampleParent = new Scene(document.getElementById("otherExampleParent"));

    // load scene content using this
    exampleParent.load("./scns/example_scene");
    otherExampleParent.load("./scns/other_example_scene");

    // unload scene after a while
    setTimeout(() => { exampleParent.unload() }, 4000);
</script>
